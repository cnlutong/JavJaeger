version: '3.8'

services:
  javjaeger:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: javjaeger
    restart: unless-stopped
    ports:
      # host:container (container port fixed at 5000)
      - "8000:5000"
    environment:
      # Optional JavBus origin override. Defaults to https://www.javbus.com
      # - JAVBUS_BASE_URL=https://www.javbus.com
      # Optional proxy for accessing JavBus directly
      # - JAVBUS_PROXY=http://127.0.0.1:7890
      # Optional request interval in seconds. 0 disables throttling.
      # - JAVBUS_REQUEST_INTERVAL_SECONDS=0.5
      # Runtime settings are persisted under the mounted data directory by default.
      - JAVJAEGER_CONFIG_PATH=/app/data/config.json
      # Strongly recommended in real deployments
      - APP_SESSION_SECRET=change-this-session-secret
    volumes:
      # Persistent data directory
      - ./data:/app/data
      # If you override JAVJAEGER_CONFIG_PATH, keep that path writable for the Settings page.
