<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% if version_info.disable_cache %}
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    {% endif %}
    <title>JavJaeger</title>
    <!-- Ant Design CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/antd@5.23.0/dist/reset.css">
    <link rel="stylesheet" href="/static/style.css?v={{ version_info.version }}">
    <link rel="stylesheet" href="/static/webdav.css?v={{ version_info.version }}">
    <!-- React & ReactDOM -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
    <!-- Ant Design -->
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.13/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/antd@5.23.0/dist/antd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ant-design/icons@5.2.6/dist/index.umd.js"></script>
</head>

<body>
    <div id="root"></div>

    <!-- Inject Version Information -->
    <script>
        window.versionInfo = {
            version: "{{ version_info.version }}",
            build_date: "{{ version_info.build_date }}",
            asset_version: "{{ version_info.asset_version | default(version_info.version) }}",
            auto_reload_frontend: {{ "true" if version_info.auto_reload_frontend else "false" }},
        };
    </script>

    <!-- React Application -->
    <script src="/static/app.js?v={{ version_info.asset_version | default(version_info.version) }}" defer></script>
</body>

</html>
